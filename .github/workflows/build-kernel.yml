name: Build GKI Kernel - mayfly (KernelSU Next + SuSFS)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build GKI 5.10 + KSU Next + SuSFS
    runs-on: ubuntu-22.04
    env:
      ARCH: arm64
      GDRIVE_FILE_ID: 10mVhr4fihWPPSz0ws-pY-YF-kboaFYCC

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends git curl wget python3 python3-pip bc bison flex libssl-dev libelf-dev binutils-aarch64-linux-gnu cpio zip unzip make ninja-build lz4 zstd jq

      - name: Install repo tool
        run: |
          mkdir -p ~/.bin
          curl -fsSL "https://storage.googleapis.com/git-repo-downloads/repo" > ~/.bin/repo
          chmod a+x ~/.bin/repo
          echo "$HOME/.bin" >> $GITHUB_PATH

      - name: Download boot.img from Google Drive
        run: |
          pip install -q gdown
          gdown "https://drive.google.com/uc?id=${GDRIVE_FILE_ID}" -O boot.img
          ls -lh boot.img

      - name: Initialize GKI kernel repo
        run: |
          mkdir -p kernel && cd kernel
          git config --global user.email "build@github.com"
          git config --global user.name "GitHub Actions"
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android12-5.10 --depth=1 --no-clone-bundle
          repo sync -c -j$(nproc) --no-clone-bundle --no-tags

      - name: Integrate KernelSU Next
        run: |
          cd kernel/common
          curl -fsSL "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next-susfs/kernel/setup.sh" | bash -s next-susfs
          echo "KernelSU Next patched"

      - name: Clone and apply SuSFS patches
        run: |
          cd kernel
          git clone --depth=1 -b gki-android12-5.10 https://gitlab.com/simonpunk/susfs4ksu.git susfs4ksu
          cd common
          for patch in ../susfs4ksu/kernel_patches/*.patch; do
            patch -p1 < "$patch" || echo "Patch failed: $patch"
          done
          echo "SuSFS patches applied"

      - name: Remove protected_exports
        run: |
          cd kernel/common
          sed -i '/^[[:space:]]*"protected_exports"/d' android/abi_gki_protected_exports_aarch64 2>/dev/null || true
          sed -i '/^[[:space:]]*"protected_exports"/d' android/abi_gki_protected_exports_x86_64 2>/dev/null || true

      - name: Apply kernel config
        run: |
          cd kernel/common
          echo "CONFIG_KSU=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_DEBUG=n" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_OVERLAYFS=n" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SPOOFY_UNAME=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> arch/arm64/configs/gki_defconfig
          echo "Config updated"

      - name: Build kernel
        run: |
          cd kernel
          # Đồng bộ lại cấu hình chuẩn hóa savedefconfig để Google không báo lỗi khớp config
          export MIXER_EXT_DEFCONFIG=common/arch/arm64/configs/gki_defconfig
          export SKIP_DEFCONFIG_VALIDATION=1
          BUILD_CONFIG=common/build.config.gki.aarch64 LTO=thin SKIP_MRPROPER=0 build/build.sh 2>&1 | tee /tmp/build.log
        timeout-minutes: 90

      - name: Download magiskboot
        run: |
          # Sử dụng GitHub API để tự động lấy link tải Magisk chính chủ phiên bản mới nhất
          MAGISK_URL=$(curl -s https://api.github.com/repos/topjohnwu/Magisk/releases/latest | jq -r '.assets[] | select(.name | endswith(".apk")) | .browser_download_url')
          wget -q "$MAGISK_URL" -O magisk.apk
          # Giải nén trực tiếp công cụ magiskboot dành cho kiến trúc Linux x86_64 ra ngoài môi trường build
          unzip -p magisk.apk lib/x86_64/libmagiskboot.so > magiskboot
          chmod +x magiskboot
          ls -lh magiskboot

      - name: Repack boot.img
        run: |
          KERNEL_IMAGE=$(find kernel/out -type f -name "Image" 2>/dev/null | head -1)
          [ -z "$KERNEL_IMAGE" ] && KERNEL_IMAGE=$(find kernel -type f -name "Image" | grep -v "\.o" | head -1)
          [ -z "$KERNEL_IMAGE" ] && KERNEL_IMAGE=$(find kernel -type f -name "Image.lz4" | grep -v "\.o" | head -1)
          [ -z "$KERNEL_IMAGE" ] && KERNEL_IMAGE=$(find kernel -type f -name "Image.gz" | grep -v "\.o" | head -1)
          
          if [ -z "$KERNEL_IMAGE" ] || [ -d "$KERNEL_IMAGE" ]; then
            echo "ERROR: Cannot find valid Kernel Image file!"
            exit 1
          fi
          
          echo "Found Kernel Image: $KERNEL_IMAGE"
          mkdir -p repack && cd repack
          cp "${{ github.workspace }}/boot.img" ./boot.img
          ../magiskboot unpack boot.img
          cp -f "${{ github.workspace }}/$KERNEL_IMAGE" ./kernel
          ../magiskboot repack boot.img new-boot.img
          ls -lh new-boot.img

      - name: Upload new-boot.img
        uses: actions/upload-artifact@v4
        with:
          name: mayfly-boot-ksu-susfs-${{ github.run_number }}
          path: repack/new-boot.img
          retention-days: 7

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: /tmp/build.log
          retention-days: 3
