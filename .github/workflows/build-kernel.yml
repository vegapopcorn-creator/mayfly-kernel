name: Build GKI Kernel - mayfly (KernelSU Next + SuSFS)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build GKI 5.10 + KSU Next + SuSFS
    runs-on: ubuntu-22.04
    env:
      ARCH: arm64
      GDRIVE_FILE_ID: 10mVhr4fihWPPSz0ws-pY-YF-kboaFYCC

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git curl wget python3 python3-pip \
            bc bison flex libssl-dev libelf-dev \
            binutils-aarch64-linux-gnu \
            cpio zip unzip make ninja-build \
            lz4 zstd

      - name: Install repo tool
        run: |
          mkdir -p ~/.bin
          curl -fsSL https://s
