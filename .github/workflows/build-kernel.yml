name: Build GKI Kernel - mayfly (KernelSU Next + SuSFS)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build GKI 5.10 + KSU Next + SuSFS
    runs-on: ubuntu-22.04
    env:
      ARCH: arm64
      GDRIVE_FILE_ID: 10mVhr4fihWPPSz0ws-pY-YF-kboaFYCC

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends git curl wget python3 python3-pip bc bison flex libssl-dev libelf-dev binutils-aarch64-linux-gnu cpio zip unzip make ninja-build lz4 zstd

      - name: Install repo tool
        run: |
          mkdir -p ~/.bin
          curl -fsSL "https://storage.googleapis.com/git-repo-downloads/repo" > ~/.bin/repo
          chmod a+x ~/.bin/repo
          echo "$HOME/.bin" >> $GITHUB_PATH

      - name: Download boot.img from Google Drive
        run: |
          pip install -q gdown
          gdown "https://drive.google.com/uc?id=${GDRIVE_FILE_ID}" -O boot.img
          ls -lh boot.img

      - name: Initialize GKI kernel repo
        run: |
          mkdir -p kernel && cd kernel
          git config --global user.email "build@github.com"
          git config --global user.name "GitHub Actions"
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android12-5.10 --depth=1 --no-clone-bundle
          repo sync -c -j$(nproc) --no-clone-bundle --no-tags

      - name: Integr
