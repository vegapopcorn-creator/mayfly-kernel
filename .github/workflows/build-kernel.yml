name: Build GKI Kernel - mayfly (KernelSU Next + SuSFS)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build GKI 5.10 + KSU Next + SuSFS
    runs-on: ubuntu-22.04
    env:
      ARCH: arm64
      GDRIVE_FILE_ID: 10mVhr4fihWPPSz0ws-pY-YF-kboaFYCC

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git curl wget python3 python3-pip \
            bc bison flex libssl-dev libelf-dev \
            binutils-aarch64-linux-gnu \
            cpio zip unzip make ninja-build \
            lz4 zstd

      - name: Install repo tool
        run: |
          mkdir -p ~/.bin
          curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo > ~/.bin/repo
          chmod a+x ~/.bin/repo
          echo "$HOME/.bin" >> $GITHUB_PATH

      - name: Download boot.img from Google Drive
        run: |
          pip install -q gdown
          gdown "https://drive.google.com/uc?id=${GDRIVE_FILE_ID}" -O boot.img
          ls -lh boot.img
          echo "✅ boot.img downloaded"

      - name: Initialize GKI kernel repo (android12-5.10)
        run: |
          mkdir -p kernel && cd kernel
          git config --global user.email "build@github.com"
          git config --global user.name "GitHub Actions"
          repo init \
            -u https://android.googlesource.com/kernel/manifest \
            -b common-android12-5.10 \
            --depth=1 \
            --no-clone-bundle
          repo sync -c -j$(nproc) --no-clone-bundle --no-tags

      - name: Integrate KernelSU Next (next-susfs branch)
        run: |
          cd kernel/common
          curl -fsSL \
            "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next-susfs/kernel/setup.sh" \
            | bash -s next-susfs
          echo "✅ KernelSU Next patched"

      - name: Clone and apply SuSFS patches
        run: |
          cd kernel
          git clone --depth=1 \
            -b gki-android12-5.10 \
            https://gitlab.com/simonpunk/susfs4ksu.git \
            susfs4ksu
          cd common
          for patch in ../susfs4ksu/kernel_patches/*.patch; do
            echo "Applying: $patch"
            patch -p1 < "$patch" || echo "⚠️ Patch failed: $patch"
          done
          if ls ../susfs4ksu/fs_patches/*.patch &>/dev/null 2>&1; then
            for patch in ../susfs4ksu/fs_patches/*.patch; do
              patch -p1 < "$patch" || echo "⚠️ fs patch failed: $patch"
            done
          fi
          echo "✅ SuSFS patches applied"

      - name: Remove protected_exports to fix WiFi/BT
        run: |
          cd kernel/common
          sed -i '/^[[:space:]]*"protected_exports"/d' android/abi_gki_protected_exports_aarch64 2>/dev/null || true
          sed -i '/^[[:space:]]*"protected_exports"/d' android/abi_gki_protected_exports_x86_64 2>/dev/null || true

      - name: Apply kernel config for KSU + SuSFS
        run: |
          cd kernel/common
          cat >> arch/arm64/configs/gki_defconfig << 'EOF'
          CONFIG_KSU=y
          CONFIG_KSU_DEBUG=n
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
