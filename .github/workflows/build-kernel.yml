name: Build GKI Kernel - mayfly (KernelSU Next + SuSFS)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build GKI 5.10 + KSU Next + SuSFS
    runs-on: ubuntu-22.04
    env:
      ARCH: arm64
      GDRIVE_FILE_ID: 10mVhr4fihWPPSz0ws-pY-YF-kboaFYCC

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git curl wget python3 python3-pip \
            bc bison flex libssl-dev libelf-dev \
            binutils-aarch64-linux-gnu \
            cpio zip unzip make ninja-build \
            lz4 zstd

      - name: Install repo tool
        run: |
          mkdir -p ~/.bin
          curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo > ~/.bin/repo
          chmod a+x ~/.bin/repo
          echo "$HOME/.bin" >> $GITHUB_PATH

      - name: Download boot.img from Google Drive
        run: |
          pip install -q gdown
          gdown "https://drive.google.com/uc?id=${GDRIVE_FILE_ID}" -O boot.img
          ls -lh boot.img
          echo "✅ boot.img downloaded"

      - name: Initialize GKI kernel repo (android12-5.10)
        run: |
          mkdir -p kernel && cd kernel
          git config --global user.email "build@github.com"
          git config --global user.name "GitHub Actions"
          repo init \
            -u https://android.googlesource.com/kernel/manifest \
            -b common-android12-5.10 \
            --depth=1 \
            --no-clone-bundle
          repo sync -c -j$(nproc) --no-clone-bundle --no-tags

      - name: Integrate KernelSU Next (next-susfs branch)
        run: |
          cd kernel/common
          curl -fsSL \
            "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next-susfs/kernel/setup.sh" \
            | bash -s next-susfs
          echo "✅ KernelSU Next patched"

      - name: Clone and apply SuSFS patches
        run: |
          cd kernel
          git clone --depth=1 \
            -b gki-android12-5.10 \
            https://gitlab.com/simonpunk/susfs4ksu.git \
            susfs4ksu
          cd common
          for patch in ../susfs4ksu/kernel_patches/*.patch; do
            echo "Applying: $patch"
            patch -p1 < "$patch" || echo "⚠️ Patch failed: $patch"
          done
          if ls ../susfs4ksu/fs_patches/*.patch &>/dev/null 2>&1; then
            for patch in ../susfs4ksu/fs_patches/*.patch; do
              patch -p1 < "$patch" || echo "⚠️ fs patch failed: $patch"
            done
          fi
          echo "✅ SuSFS patches applied"

      - name: Remove protected_exports to fix WiFi/BT
        run: |
          cd kernel/common
          sed -i '/^[[:space:]]*"protected_exports"/d' android/abi_gki_protected_exports_aarch64 2>/dev/null || true
          sed -i '/^[[:space:]]*"protected_exports"/d' android/abi_gki_protected_exports_x86_64 2>/dev/null || true

      - name: Apply kernel config for KSU + SuSFS
        run: |
          cd kernel/common
          cat >> arch/arm64/configs/gki_defconfig << 'EOF'
          CONFIG_KSU=y
          CONFIG_KSU_DEBUG=n
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SUS_OVERLAYFS=n
          CONFIG_KSU_SUSFS_TRY_UMOUNT=y
          CONFIG_KSU_SUSFS_SPOOFY_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          EOF
          echo "✅ Kernel config updated"

      - name: Build kernel
        run: |
          cd kernel
          BUILD_CONFIG=common/build.config.gki.aarch64 \
            LTO=thin \
            SKIP_MRPROPER=0 \
            build/build.sh 2>&1 | tee /tmp/build.log
        timeout-minutes: 90

      - name: Download magiskboot
        run: |
          wget -q \
            "https://github.com/topjohnwu/Magisk/releases/download/v27.0/Magisk-v27.0.apk" \
            -O magisk.apk
          unzip -p magisk.apk lib/x86_64/libmagiskboot.so > magiskboot
          chmod +x magiskboot
          echo "✅ magiskboot ready"

      - name: Repack boot.img with new kernel
        run: |
          echo "=== Finding kernel image ==="
          find kernel -type f \( -name "Image" -o -name "Image.lz4" -o -name "Image.gz" \) 2>/dev/null | grep -v "\.o"

          KERNEL_IMAGE=$(find kernel -type f -name "Image" | grep -v "\.o" | head -1)
          if [ -z "$KERNEL_IMAGE" ]; then
            KERNEL_IMAGE=$(find kernel -type f -name "Image.lz4" | grep -v "\.o" | head -1)
          fi
          if [ -z "$KERNEL_IMAGE" ]; then
            KERNEL_IMAGE=$(find kernel -type f -name "Image.gz" | grep -v "\.o" | head -1)
          fi
          echo "Found kernel: $KERNEL_IMAGE"

          mkdir -p repack && cd repack
          cp "${{ github.workspace }}/boot.img" ./boot.img
          ../magiskboot unpack boot.img
          cp "${{ github.workspace }}/$KERNEL_IMAGE" ./kernel
          ../magiskboot repack boot.img new-boot.img
          ls -lh new-boot.img
          echo "✅ new-boot.img ready"

      - name: Upload new-boot.img
        uses: actions/upload-artifact@v4
        with:
          name: mayfly-boot-ksu-susfs-${{ github.run_number }}
          path: repack/new-boot.img
          retention-days: 7

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: /tmp/build.log
          retention-days: 3

      - name: Done
        run: |
          echo "============================================"
          echo "✅ Build complete!"
          echo "Kernel : 5.10 GKI + KernelSU Next + SuSFS"
          echo "Device : Xiaomi Mi 12S (mayfly)"
          echo "Flash  : fastboot flash boot new-boot.img"
          echo "============================================"
